<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Sazia 🕷️</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Bangers&family=Poppins:wght@300&display=swap');

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* INTRO SCREEN */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 999;
}

#intro h1 {
    font-family: 'Bangers';
    color: red;
    font-size: 3rem;
    text-shadow: 0 0 30px red;
}

#enterBtn {
    margin-top: 20px;
    padding: 12px 25px;
    background: red;
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

/* MAIN */
#main {
    display: none;
    text-align: center;
}

h1 {
    font-family: 'Bangers';
    color: red;
    font-size: 3rem;
}

/* Chat style */
.chat {
    width: 90%;
    margin: auto;
}

.msg {
    background: #111;
    border: 1px solid red;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
    text-align: left;
}

/* Typing */
#typing {
    white-space: pre-line;
    min-height: 120px;
}

/* Gallery */
img {
    width: 80%;
    border-radius: 15px;
    box-shadow: 0 0 20px red;
}

/* Gift */
.gift {
    font-size: 2rem;
    cursor: pointer;
}

/* Secret page */
#secret {
    display: none;
    padding: 20px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    <h1>🕷️ Spider-Verse Loading...</h1>
    <button id="enterBtn" onclick="enterSite()">Enter 🕸️</button>
</div>

<!-- MAIN -->
<div id="main">

<h1>Happy Birthday Sazia 🕷️</h1>

<!-- Chat Story -->
<div class="chat">
    <div class="msg">You: Hey 👀</div>
    <div class="msg">Her: Kya hua?</div>
    <div class="msg">You: Kuch special hai aaj 😏</div>
    <div class="msg">Her: Kyaaa?</div>
    <div class="msg">You: Scroll karo 👇</div>
</div>

<!-- Message -->
<div class="chat">
    <div class="msg" id="typing"></div>
</div>

<!-- Gallery -->
<div>
    <h3>📸 Our Memories</h3>
    <img id="slide" src="https://i.ibb.co/6rG8XhS/spiderman.png">
</div>

<!-- Gift -->
<div>
    <h3>🎁 Secret Gift</h3>
    <div class="gift" onclick="openSecret()">🎁 Tap Me</div>
</div>

</div>

<!-- SECRET PAGE -->
<div id="secret">
    <h1>You found it 🕷️❤️</h1>
    <p>You’re not just my bestie… you’re my favorite person.</p>
</div>

<audio id="music">
<source src="https://www.myinstants.com/media/sounds/spiderman-theme.mp3">
</audio>

<script>
// Enter
function enterSite(){
    document.getElementById("intro").style.display="none";
    document.getElementById("main").style.display="block";
    document.getElementById("music").play();
}

// Typing message
const msg = `Happy birthday to the girl who has been there through it all!

Sazia, you’re more than just a friend; you’re family.

I hope your year is filled with as much joy and light as you bring into my life.

Let’s make this year the best one yet! ❤️`;

let i=0;
function type(){
    if(i<msg.length){
        document.getElementById("typing").innerHTML += msg.charAt(i);
        i++;
        setTimeout(type,30);
    }
}
type();

// Gallery
const imgs=[
"https://i.ibb.co/6rG8XhS/spiderman.png",
"https://i.ibb.co/6rG8XhS/spiderman.png"
];

let x=0;
setInterval(()=>{
    x=(x+1)%imgs.length;
    document.getElementById("slide").src=imgs[x];
},2000);

// Secret
function openSecret(){
    document.getElementById("main").style.display="none";
    document.getElementById("secret").style.display="block";
}
</script>

</body>
</html>
